model_name: gpt-5-mini
prompt: |
  You are given a GitHub issue description for a repository. Your task is to
  write a reproduction test that fails on the current codebase due to the
  described issue and would pass once the issue is resolved.

  # Step-by-step instructions:

  1. Explore the codebase to understand the relevant code related to the issue.

  2. Explore the codebase to find existing tests that touch the relevant code, 
     and understand how they are structured, how they set up the context, and
     how they work. This will help you write a test that is consistent with the
     existing tests.

  3. Decide whether an existing test should be modified to reproduce the issue, 
     or if a new test should be created. If you think that an existing test 
     will break if the issue is fixed, it may be a good candidate for
     modification. New tests should be added to the same test file or class as
     related tests. Create a new test file or class only if there is no related
     test.
   
   4. Run the added or modified tests, and possibly other related tests.

      4a. Check that the tests fail.
      4b. Check that the test does not fail due to an error in the test setup
          or an error in the test itself.
      4c. Check that the test fails specifically because of the issue described
          in the problem statement.
      
      Keep modifying the tests until the above conditions are satisfied and you
      have a failing test that accurately reproduces the issue.

  Although you will not be fixing the issue, you should think what the fix
  would look like in order to make sure that the test you wrote would pass once
  the issue is fixed.

  # Issue description:
  
  {problem_statement}
