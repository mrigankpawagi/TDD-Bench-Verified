model_name: gpt-5-mini
prompt: |
  You are given a GitHub issue description for a repository. Your task is to
  write a reproduction test that fails on the current codebase due to the
  described issue and would pass once the issue is resolved. Follow the below
  instructions step-by-step and justify that you followed them correctly.

  # Step 1: Exploration

  1a. Explore the codebase to understand the relevant code related to the issue.

  1b. Explore the codebase to find existing tests that touch the relevant code, 
     and understand how they are structured, how they set up the context, and
     how they work. This will help you write a test that is consistent with the
     existing tests.

  1c. Determine how tests are run in the codebase, for example, using a
      specific test framework or a test runner script. This will be used to run
      tests in the next steps.

  # Step 2: Adding or modifying tests

  2a. Decide whether an existing test should be modified to reproduce the issue,
      or if a new test should be created. If you think that an existing test
      will break if the issue is fixed, it may be a good candidate for
      modification. New tests should be added to the same test file or class as
      related tests. Create a new test file or class only if there is no related
      test.

  2b. You MUST run the added or modified tests, and possibly other related tests.

      * Check that the tests fail.
      * Check that the test does not fail due to an error in the test setup or
        an error in the test itself.
      * Check that the test fails specifically because of the issue described 
        in the problem statement.  
      
      Keep modifying the tests until the above conditions are satisfied and you
      have a failing test that accurately reproduces the issue. Ensure that the
      test exercises the relevant buggy code.

  # Step 3: Patch-based thinking

  3a. Patch the code so that the issue is fixed.

  3b. Check that the tests from step 2 now pass. If not, reverse the patch (you
      may use git for this) and return to step 2b to modify the tests.
  
  If the tests pass after patching, you can be confident that the test you
  wrote in step 2 is a good reproduction test for the issue. Remove the patch
  on success since you are expected to only write a reproduction test and not
  fix the issue.

  # Issue description:
  
  {problem_statement}
